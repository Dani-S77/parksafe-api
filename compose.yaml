services:
  db:
    image: postgres:16-alpine
    container_name: parksafe_db
    environment:
      POSTGRES_DB: parksafe_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: parksafe_api
    ports:
      - "8082:8082"
    environment:
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-desarrollo-local-parksafe-2024-must-be-long}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/parksafe_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
